# Dependabot configuration for medfit
# Keeps GitHub Actions up to date automatically
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    # Target the integration branch so CI bumps follow the dev->main PR flow
    # (default is main, which would leave main ahead of dev and force back-merges)
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
