# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Hide CLAUDE.md from pkgdown
        run: |
          # pkgdown renders every root-level *.md into a site page (HTML,
          # plus an llms.txt-era markdown twin, a sitemap.xml entry, and a
          # full-text search.json entry — see pkgdown:::package_mds()).
          # CLAUDE.md must stay at the repo root for Claude Code discovery,
          # so it can't be moved like the other internal planning docs.
          # This checkout is a disposable CI copy, so just remove it here
          # before the build ever sees it; the tracked file is untouched.
          rm -f CLAUDE.md

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Add root redirect for dev versions
        run: |
          if [ -d "docs/dev" ] && [ ! -f "docs/index.html" ]; then
            cp pkgdown/extra/index.html docs/index.html
          fi

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          clean: true
          branch: gh-pages
          folder: docs
