# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_CODOC_S4_METHODS_: false

    steps:
      - uses: actions/checkout@v7

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          args: 'c("--no-manual", "--as-cran", "--no-codoc")'
          error-on: '"error"'

  # noSuggests: emulate CRAN's "noSuggests" check flavor. Installs only hard
  # dependencies (Depends/Imports/LinkingTo) and runs check with
  # _R_CHECK_DEPENDS_ONLY_=true, so any Suggests package used without a
  # requireNamespace() guard fails here. Plain --as-cran misses this because it
  # installs Suggests. (Caught the unguarded MASS use in the parametric
  # bootstrap; see rforge docs/specs/PROPOSAL-cran-incoming-hardening.)
  noSuggests:
    runs-on: ubuntu-latest

    name: ubuntu-latest (release, noSuggests)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_DEPENDS_ONLY_: true
      _R_CHECK_CODOC_S4_METHODS_: false

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::rcmdcheck

      - uses: r-lib/actions/check-r-package@v2
        with:
          build_args: 'c("--no-manual")'
          args: 'c("--no-manual", "--as-cran", "--no-codoc")'
          error-on: '"error"'
